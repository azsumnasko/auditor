services:
  config-ui:
    build:
      context: config-ui
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - jira_data:/data
    environment:
      - DATA_DIR=/data
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      # - ADMIN_EMAIL=azsumnasko@mail.bg
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    volumes:
      - jira_data:/data
      # Uncomment and set CODE_REPOS_PATH to mount local repos for code_analytics:
      # - ${CODE_REPOS_PATH}:/repos:ro
    environment:
      - DATA_DIR=/data
      # - CODE_REPOS_PATH=/repos
    restart: unless-stopped

volumes:
  jira_data:
