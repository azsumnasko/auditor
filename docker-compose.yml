services:
  config-ui:
    build:
      context: config-ui
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - jira_data:/data
    environment:
      - DATA_DIR=/data
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      # - ADMIN_EMAIL=azsumnasko@mail.bg
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    volumes:
      - jira_data:/data
    environment:
      - DATA_DIR=/data
    restart: unless-stopped

volumes:
  jira_data:
